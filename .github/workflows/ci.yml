name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Check formatting with black
        run: uv run black --check src/ tests/

      - name: Run tests
        env:
          OPENAI_API_KEY: "sk-test-dummy-key-for-ci"
          CHROMA_HOST: "local"
          CHROMA_PORT: "8000"
          CHROMA_COLLECTION: "bancolombia_kb_test"
          CHUNK_SIZE: "500"
          CHUNK_OVERLAP: "50"
          TOP_K_RESULTS: "5"
          BANCOLOMBIA_BASE_URL: "https://www.bancolombia.com/personas"
          MAX_PAGES: "50"
          MCP_SERVER_HOST: "localhost"
          MCP_SERVER_PORT: "8000"
          MCP_TRANSPORT: "stdio"
        run: uv run pytest tests/ -v --tb=short

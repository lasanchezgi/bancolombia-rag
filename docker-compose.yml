services:

  # ─── ChromaDB: vector store persistente ────────────────────────────────────
  chromadb:
    image: chromadb/chroma:1.0.0
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rag_network

  # ─── Frontend: Streamlit chat UI ───────────────────────────────────────────
  # El agente que corre dentro del frontend lanza el mcp_server como proceso
  # hijo via stdio — NO como servicio de red separado. Esto es el patrón
  # correcto del protocolo MCP con transporte stdio.
  frontend:
    image: lasanchezgi/bancolombia-rag:latest
    command: >
      uv run streamlit run src/frontend/app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MCP_SERVER_SCRIPT=src/mcp_server/server.py
      - MONITORING_PASSWORD=${MONITORING_PASSWORD:-bancolombia2026}
      - USE_RERANKING=${USE_RERANKING:-false}
    volumes:
      - .memory:/app/.memory          # LongTermMemory persistida entre reinicios
      - ./data:/app/data              # datos del scraper accesibles al frontend
      - chroma_data_local:/app/.chroma  # ChromaDB local como fallback
      - ./.env:/app/.env:ro           # variables de entorno accesibles al proceso hijo
    depends_on:
      - chromadb
    networks:
      - rag_network
    restart: unless-stopped

  # ─── Scraper: job one-time ─────────────────────────────────────────────────
  # Uso: docker compose --profile tools up scraper
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python scripts/run_scraper.py
    env_file:
      - .env
    environment:
      - MAX_PAGES=80
    volumes:
      - ./data:/app/data
    networks:
      - rag_network
    profiles:
      - tools

  # ─── Pipeline: job one-time ────────────────────────────────────────────────
  # Uso: docker compose --profile tools up pipeline
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python scripts/run_pipeline.py
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./data:/app/data
    depends_on:
      chromadb:
        condition: service_healthy
    networks:
      - rag_network
    profiles:
      - tools

volumes:
  chroma_data:
  chroma_data_local:

networks:
  rag_network:
    driver: bridge
